<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Progress Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">SP</div>
        <div>
          <h1>Study Progress</h1>
          <p>A-Level prep tracker</p>
        </div>
      </div>

      <div class="account-panel" aria-label="Account and sync">
        <div class="sync-pill" id="syncStatus" data-status="offline">
          <span class="sync-dot" aria-hidden="true"></span>
          <span id="syncStatusText">Offline</span>
        </div>
        <div class="profile-card signed-out" id="profileCard">
          <div class="profile-copy">
            <strong>Not signed in</strong>
            <span>Local backup active</span>
          </div>
        </div>
        <button class="primary-btn account-btn" id="signInBtn" type="button">Sign in with Google</button>
        <button class="ghost-btn account-btn hidden" id="signOutBtn" type="button">Sign Out</button>
      </div>

      <nav class="nav-list" aria-label="Main navigation">
        <button class="nav-item active" data-view="dashboard" type="button">
          <span class="nav-icon">D</span><span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="subjects" type="button">
          <span class="nav-icon">S</span><span>Subjects</span>
        </button>
        <button class="nav-item" data-view="focus" type="button">
          <span class="nav-icon">F</span><span>Focus</span>
        </button>
        <button class="nav-item" data-view="settings" type="button">
          <span class="nav-icon">T</span><span>Settings</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <div class="streak-pill">
          <span class="spark"></span>
          <strong id="streakCount">0</strong>
          <span>day streak</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" id="menuToggle" type="button" aria-label="Open navigation">☰</button>
        <div>
          <p class="eyebrow" id="viewEyebrow">Dashboard</p>
          <h2 id="viewTitle">Exam Preparation Overview</h2>
        </div>
        <div class="top-actions">
          <button class="ghost-btn" id="quickSubtopicBtn" type="button">+ Subtopic</button>
          <button class="ghost-btn" id="quickTopicBtn" type="button">+ Topic</button>
          <button class="primary-btn" id="newSubjectBtn" type="button">+ Subject</button>
        </div>
      </header>

      <section class="view active" id="dashboardView">
        <div class="dashboard-grid" id="statsGrid"></div>
        <section class="glass-panel progress-hero">
          <div>
            <p class="panel-kicker">Overall Progress</p>
            <h3 id="overallPercent">0%</h3>
            <p id="overallCaption">Complete subtopics across your whole syllabus.</p>
          </div>
          <div class="circle-wrap">
            <svg class="progress-ring" viewBox="0 0 120 120" aria-hidden="true">
              <circle cx="60" cy="60" r="50" class="ring-bg"></circle>
              <circle cx="60" cy="60" r="50" class="ring-value" id="overallRing"></circle>
            </svg>
            <span id="overallRingText">0%</span>
          </div>
          <div class="wide-progress">
            <div class="progress-track"><div class="progress-fill" id="overallBar"></div></div>
          </div>
        </section>
        <section class="split-grid">
          <div class="glass-panel">
            <div class="section-head">
              <div>
                <p class="panel-kicker">Recently Studied</p>
                <h3>Latest Updates</h3>
              </div>
            </div>
            <div class="activity-list" id="recentList"></div>
          </div>
